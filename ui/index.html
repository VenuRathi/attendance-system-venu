<!DOCTYPE html>
<html>
<head>
  <title>RFID Attendance</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<h2>RFID Attendance System</h2>

<!-- RESET BUTTON -->
<button onclick="resetData()">Reset Data</button>

<hr>

<!-- LIVE DATA -->
<h3>Live Scans</h3>
<ul id="feed"></ul>

<hr>

<!-- COUNTS -->
<p>Total: <span id="total">0</span></p>
<p>Present: <span id="present">0</span></p>
<p>Duplicate: <span id="duplicate">0</span></p>
<p>Invalid: <span id="invalid">0</span></p>

<hr>

<!-- CHART -->
<canvas id="chart" width="400" height="200"></canvas>

<script>
const API = "https://attendance-system-ul60.onrender.com/attendance";

let chart;

// 🔥 FETCH DATA
function fetchData() {
  fetch(API)
    .then(res => res.json())
    .then(data => {

      // COUNTS
      document.getElementById("total").innerText = data.length;

      const present = data.filter(d => d.status === "present").length;
      const duplicate = data.filter(d => d.status === "duplicate").length;
      const invalid = data.filter(d => d.status === "invalid").length;

      document.getElementById("present").innerText = present;
      document.getElementById("duplicate").innerText = duplicate;
      document.getElementById("invalid").innerText = invalid;

      // 🔴 REAL-TIME FEED
      const feed = document.getElementById("feed");
      feed.innerHTML = "";

      data.slice(-5).reverse().forEach(d => {
        const li = document.createElement("li");
        li.innerText = `${d.name} (${d.uid}) - ${d.status}`;
        feed.appendChild(li);
      });

      // 📊 CHART
      updateChart(present, duplicate, invalid);
    });
}

// 📊 CHART FUNCTION
function updateChart(present, duplicate, invalid) {

  const data = {
    labels: ["Present", "Duplicate", "Invalid"],
    datasets: [{
      label: "Attendance",
      data: [present, duplicate, invalid]
    }]
  };

  if (chart) {
    chart.data = data;
    chart.update();
  } else {
    const ctx = document.getElementById("chart").getContext("2d");
    chart = new Chart(ctx, {
      type: "bar",
      data: data
    });
  }
}

// 🔁 AUTO REFRESH
setInterval(fetchData, 2000);
fetchData();

// 🔥 RESET
function resetData() {
  fetch("https://attendance-system-ul60.onrender.com/reset", {
    method: "POST"
  })
  .then(() => {
    alert("Reset Done");
    fetchData();
  });
}
</script>

</body>
</html>
