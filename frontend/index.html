<!DOCTYPE html>
<html lang="eng">
<head>
    <title>Attendance Dashboard</title>

    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            text-align: center;
        }

        h1 {
            margin-top: 20px;
        }

        table {
            margin: auto;
            margin-top: 20px;
            border-collapse: collapse;
            width: 70%;
        }

        th, td {
            border: 1px solid #444;
            padding: 10px;
        }

        th {
            background: #1e293b;
        }

        tr:nth-child(even) {
            background: #1e293b;
        }

        .status {
            margin-top: 10px;
            color: #22c55e;
        }
    </style>
</head>

<body>

<h1>📡 RFID Attendance Dashboard</h1>
<div class="status">Live Updating...</div>

<table>
    <thead>
        <tr>
            <th>ID</th>
            <th>UID</th>
            <th>Name</th>
            <th>Timestamp</th>
        </tr>
    </thead>
    <tbody id="data">
    </tbody>
</table>

<script>

const API_URL = "http://192.168.1.5:5000/attendance";

async function fetchData() {
    try {
        const res = await fetch(API_URL);
        const data = await res.json();

        const table = document.getElementById("data");
        table.innerHTML = "";

        data.forEach(row => {
            const tr = document.createElement("tr");

            tr.innerHTML = `
                <td>${row.id}</td>
                <td>${row.uid}</td>
                <td>${row.name}</td>
                <td>${row.timestamp}</td>
            `;

            table.appendChild(tr);
        });

    } catch (err) {
        console.log("Error:", err);
    }
}

// 🔥 AUTO REFRESH EVERY 2 SEC (REAL-TIME FEEL)
setInterval(fetchData, 2000);

// initial load
fetchData();

</script>

</body>
</html>
