<!DOCTYPE html>
<html>
<head>
  <title>RFID_CTRL</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: #0f1117;
      color: white;
    }

    .app {
      display: flex;
    }

    /* SIDEBAR */
    .sidebar {
      width: 230px;
      background: #161b22;
      height: 100vh;
      padding: 20px;
      border-right: 1px solid #30363d;
    }

    .sidebar h2 {
      font-size: 18px;
      margin-bottom: 20px;
    }

    .nav-item {
      padding: 10px;
      margin-bottom: 10px;
      cursor: pointer;
      border-radius: 6px;
    }

    .nav-item:hover {
      background: #21262d;
    }

    /* MAIN */
    .main {
      flex: 1;
      padding: 20px;
    }

    .header {
      font-size: 22px;
      margin-bottom: 10px;
    }

    .status {
      color: #00ff88;
      font-size: 14px;
      margin-bottom: 20px;
    }

    /* CARDS */
    .cards {
      display: flex;
      gap: 20px;
      margin-bottom: 20px;
    }

    .card {
      flex: 1;
      background: #161b22;
      padding: 20px;
      border-radius: 10px;
      border: 1px solid #30363d;
    }

    .card h3 {
      margin: 0;
      font-size: 14px;
      color: #8b949e;
    }

    .card p {
      font-size: 28px;
      margin-top: 10px;
    }

    /* FEED */
    .feed {
      background: #161b22;
      padding: 20px;
      border-radius: 10px;
      border: 1px solid #30363d;
      margin-bottom: 20px;
    }

    .feed-item {
      padding: 10px;
      border-bottom: 1px solid #30363d;
    }

    /* SESSION */
    .session {
      background: #161b22;
      padding: 20px;
      border-radius: 10px;
      border: 1px solid #30363d;
      text-align: center;
    }

    /* BUTTON */
    button {
      padding: 10px 15px;
      background: red;
      border: none;
      color: white;
      border-radius: 6px;
      cursor: pointer;
    }

  </style>
</head>

<body>

<div class="app">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h2>RFID_CTRL</h2>

    <div class="nav-item">Dashboard</div>
    <div class="nav-item">Lectures</div>
    <div class="nav-item">Analytics</div>
    <div class="nav-item" onclick="resetData()">Reset System</div>
    <div class="nav-item">About Us</div>
  </div>

  <!-- MAIN -->
  <div class="main">

    <div class="header">System Dashboard</div>
    <div class="status">● SYSTEM ONLINE</div>

    <!-- CARDS -->
    <div class="cards">
      <div class="card">
        <h3>Total Scans</h3>
        <p id="total">0</p>
      </div>

      <div class="card">
        <h3>Present</h3>
        <p id="present" style="color:#00ff88;">0</p>
      </div>

      <div class="card">
        <h3>Duplicate</h3>
        <p id="duplicate" style="color:#ffcc00;">0</p>
      </div>

      <div class="card">
        <h3>Invalid</h3>
        <p id="invalid" style="color:#ff4d4d;">0</p>
      </div>
    </div>

    <!-- FEED -->
    <div class="feed">
      <h3>Live Scan Feed</h3>
      <div id="feed">No recent scans detected</div>
    </div>

    <!-- SESSION -->
    <div class="session">
      <h3>Active Session</h3>
      <p>System Idle</p>
    </div>

    <!-- CHART -->
    <canvas id="chart" style="margin-top:20px;"></canvas>

  </div>
</div>

<script>

const API = "https://attendance-system-ul60.onrender.com/attendance";
let chart;

// FETCH DATA
function fetchData() {
  fetch(API)
    .then(res => res.json())
    .then(data => {

      document.getElementById("total").innerText = data.length;

      const present = data.filter(d => d.status === "present").length;
      const duplicate = data.filter(d => d.status === "duplicate").length;
      const invalid = data.filter(d => d.status === "invalid").length;

      document.getElementById("present").innerText = present;
      document.getElementById("duplicate").innerText = duplicate;
      document.getElementById("invalid").innerText = invalid;

      // FEED
      const feed = document.getElementById("feed");
      feed.innerHTML = "";

      if (data.length === 0) {
        feed.innerText = "No recent scans detected";
      } else {
        data.slice(-10).reverse().forEach(d => {
          feed.innerHTML += `
            <div class="feed-item">
              ${d.name} (${d.uid}) - ${d.status}
            </div>
          `;
        });
      }

      updateChart(present, duplicate, invalid);
    });
}

// CHART
function updateChart(present, duplicate, invalid) {

  const data = {
    labels: ["Present", "Duplicate", "Invalid"],
    datasets: [{
      label: "Attendance",
      data: [present, duplicate, invalid]
    }]
  };

  if (chart) {
    chart.data = data;
    chart.update();
  } else {
    const ctx = document.getElementById("chart").getContext("2d");
    chart = new Chart(ctx, {
      type: "bar",
      data: data
    });
  }
}

// RESET
function resetData() {
  fetch("https://attendance-system-ul60.onrender.com/reset", {
    method: "POST"
  })
  .then(() => {
    alert("System Reset Done");
    fetchData();
  });
}

// AUTO REFRESH
setInterval(fetchData, 2000);
fetchData();

</script>

</body>
</html>
